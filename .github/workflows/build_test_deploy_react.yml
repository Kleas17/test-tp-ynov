name: Build, Test and Deploy React Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: my-app

      - name: Run tests
        run: npm test
        working-directory: my-app

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: my-app
          install: false
          start: npm start
          wait-on: http://localhost:3000
          wait-on-timeout: 120
        env:
          REACT_APP_API_URL: https://jsonplaceholder.typicode.com
          REACT_APP_API_TOKEN: ${{ secrets.JSONPLACEHOLDER_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: my-app/coverage/lcov.info
          fail_ci_if_error: true

      - name: Generate JSDoc
        run: npm run docs
        working-directory: my-app

      - name: Build project
        run: npm run build
        working-directory: my-app
        env:
          PUBLIC_URL: /${{ github.event.repository.name }}
          REACT_APP_API_URL: https://jsonplaceholder.typicode.com
          REACT_APP_API_TOKEN: ${{ secrets.JSONPLACEHOLDER_TOKEN }}

      - name: Verify docs are included in artifact
        run: test -d build/docs
        working-directory: my-app

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: my-app/build
          if-no-files-found: error

  publish-npm:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: my-app

    outputs:
      should_publish: ${{ steps.version_check.outputs.should_publish }}
      local_version: ${{ steps.version_check.outputs.local_version }}
      published_version: ${{ steps.version_check.outputs.published_version }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org/
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Compare local and npm versions
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)
          PUBLISHED_VERSION="${PUBLISHED_VERSION//$'\n'/}"

          SHOULD_PUBLISH=$(node -e "
            const local = process.argv[1];
            const remote = process.argv[2];
            if (!remote) { process.stdout.write('true'); process.exit(0); }
            function parse(v) {
              const clean = v.split('+')[0];
              const [core, pre = ''] = clean.split('-');
              const [maj, min, pat] = core.split('.').map(Number);
              return { maj, min, pat, pre: pre ? pre.split('.') : [] };
            }
            function cmpId(a, b) {
              const aNum = /^[0-9]+$/.test(a);
              const bNum = /^[0-9]+$/.test(b);
              if (aNum && bNum) return Number(a) - Number(b);
              if (aNum) return -1;
              if (bNum) return 1;
              return a.localeCompare(b);
            }
            function compare(a, b) {
              const A = parse(a);
              const B = parse(b);
              for (const key of ['maj', 'min', 'pat']) {
                if (A[key] !== B[key]) return A[key] - B[key];
              }
              if (A.pre.length === 0 && B.pre.length === 0) return 0;
              if (A.pre.length === 0) return 1;
              if (B.pre.length === 0) return -1;
              const length = Math.max(A.pre.length, B.pre.length);
              for (let i = 0; i < length; i += 1) {
                if (A.pre[i] === undefined) return -1;
                if (B.pre[i] === undefined) return 1;
                const diff = cmpId(A.pre[i], B.pre[i]);
                if (diff !== 0) return diff;
              }
              return 0;
            }
            process.stdout.write(compare(local, remote) > 0 ? 'true' : 'false');
          " "$LOCAL_VERSION" "$PUBLISHED_VERSION")

          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "published_version=$PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"

          if [ "$SHOULD_PUBLISH" = "true" ]; then
            echo "Will publish: local=$LOCAL_VERSION, npm=${PUBLISHED_VERSION:-none}"
          else
            echo "Skip publish: local=$LOCAL_VERSION is not greater than npm=$PUBLISHED_VERSION"
          fi

      - name: Build npm package
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm run build-npm

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  validate-docker-stack:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish-npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node for Cypress smoke test
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Create CI env file
        run: |
          cat <<EOF > .env
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=ynov_ci
          MYSQL_USER=ynov_app
          MYSQL_PASSWORD=ci_app_pwd
          MYSQL_PORT=3306
          API_PORT=8000
          ADMINER_PORT=8080
          REACT_PORT=3000
          EOF

      - name: Build and start docker compose stack
        run: docker compose up -d --build

      - name: Wait for API health
        shell: bash
        run: |
          for i in {1..40}; do
            HTTP_CODE=$(curl -s -o api-health.json -w "%{http_code}" http://localhost:8000/health || true)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API is healthy."
              exit 0
            fi
            echo "Waiting for API... attempt $i/40 (HTTP=$HTTP_CODE)"
            sleep 3
          done
          echo "API did not become ready in time."
          [ -f api-health.json ] && cat api-health.json || true
          docker compose logs api mysql react || true
          exit 1

      - name: Wait for React app
        shell: bash
        run: |
          for i in {1..40}; do
            HTTP_CODE=$(curl -s -o react-home.html -w "%{http_code}" http://localhost:3000 || true)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "React app is reachable."
              exit 0
            fi
            echo "Waiting for React... attempt $i/40 (HTTP=$HTTP_CODE)"
            sleep 3
          done
          echo "React app did not become ready in time."
          [ -f react-home.html ] && cat react-home.html || true
          docker compose logs react || true
          exit 1

      - name: Validate /users endpoint with curl
        shell: bash
        run: |
          for i in {1..30}; do
            HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" http://localhost:8000/users || true)
            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi
            echo "Waiting for API... attempt $i/30 (HTTP=$HTTP_CODE)"
            sleep 2
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "API did not return HTTP 200."
            [ -f response.json ] && cat response.json || true
            docker compose logs api || true
            exit 1
          fi

          USERS_COUNT=$(jq 'if type == "array" then length elif (.utilisateurs? | type) == "array" then .utilisateurs | length else 0 end' response.json)
          if [ -z "$USERS_COUNT" ] || [ "$USERS_COUNT" -le 0 ]; then
            echo "Endpoint returned an empty users list."
            cat response.json
            exit 1
          fi

          echo "Validation passed with $USERS_COUNT utilisateurs."

      - name: Install Cypress dependencies
        run: npm install
        working-directory: my-app

      - name: Run live stack Cypress smoke test
        run: npx cypress run --spec cypress/e2e/live-stack.cy.js
        working-directory: my-app

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag API image
        run: |
          docker tag ynov_fastapi ${{ secrets.DOCKERHUB_USERNAME }}/ynov-fastapi:${{ github.sha }}
          docker tag ynov_fastapi ${{ secrets.DOCKERHUB_USERNAME }}/ynov-fastapi:latest

      - name: Push API image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ynov-fastapi:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ynov-fastapi:latest

      - name: Print docker compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup containers
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [publish-npm, validate-docker-stack]
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
